stages:
  - lint
  - build
  - test
  - e2e

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

# ============================================
# CACHE
# ============================================

.backend-cache: &backend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-backend"
    paths:
      - .m2/repository

.frontend-cache: &frontend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-frontend"
    paths:
      - frontend/.npm/

.e2e-cache: &e2e-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-e2e"
    paths:
      - e2e/.npm/

# ============================================
# LINT
# ============================================

lint-backend:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn validate
  only:
    - main

lint-frontend:
  stage: lint
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npx eslint src || true
  only:
    - main

# ============================================
# BUILD
# ============================================

build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 hour
  only:
    - main

build-frontend:
  stage: build
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/build/
    expire_in: 1 hour
  only:
    - main

# ============================================
# TEST
# ============================================

test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn test
  only:
    - main

test-frontend:
  stage: test
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm test -- --watchAll=false
  only:
    - main

# ============================================
# API TESTING / NEWMAN
# ============================================

test-api-newman:
  stage: test
  image: node:24-bullseye
  services:
    - postgres:15
  variables:
    POSTGRES_DB: asset_maintenance
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
  cache:
    key: "$CI_COMMIT_REF_SLUG-automation"
    paths:
      - automation/node_modules/
      - .m2/repository/
  before_script:
    # Install Java and Maven
    - apt-get update -qq && apt-get install -y -qq openjdk-17-jre-headless maven curl
    # Build backend
    - cd backend
    - mvn clean package -DskipTests -q
    - cd ..
    # Start backend in background
    - java -Dspring.datasource.url=jdbc:postgresql://postgres:5432/asset_maintenance -Dspring.datasource.username=postgres -Dspring.datasource.password=postgres -Dserver.port=8080 -jar backend/target/*.jar > /tmp/backend.log 2>&1 &
    - sleep 20
    - echo "✓ Backend started, checking health..."
    - for i in {1..10}; do curl -s http://127.0.0.1:8080/api/assets && echo "✓ Backend ready" && break || (echo "Retry $i..." && sleep 2); done
    # Setup npm and tests
    - cd automation
    - npm ci
    - mkdir -p /tmp
    - |
      node -e "
      const fs = require('fs');
      const envFile = {
        id: 'ci-environment',
        name: 'CI Environment',
        values: [
          {key: 'api_url', value: 'http://127.0.0.1:8080/api', type: 'string', enabled: true},
          {key: 'manager_email', value: process.env.MANAGER_EMAIL || 'manager@test.com', type: 'string', enabled: true},
          {key: 'manager_password', value: process.env.MANAGER_PASSWORD || 'Manager@1234', type: 'string', enabled: true},
          {key: 'technician_email', value: process.env.TECHNICIAN_EMAIL || 'technician@test.com', type: 'string', enabled: true},
          {key: 'technician_password', value: process.env.TECHNICIAN_PASSWORD || 'Tech@1234', type: 'string', enabled: true},
          {key: 'user_email', value: process.env.USER_EMAIL || 'user@test.com', type: 'string', enabled: true},
          {key: 'user_password', value: process.env.USER_PASSWORD || 'User@1234', type: 'string', enabled: true}
        ]
      };
      fs.writeFileSync('/tmp/ci-env.json', JSON.stringify(envFile, null, 2));
      console.log('✓ Environment file created');
      "
  script:
    - npm run test:api -- --environment /tmp/ci-env.json
  artifacts:
    when: always
    paths:
      - automation/postman-report.html
      - automation/newman-results.json
    reports:
      junit: automation/newman-results.xml
    expire_in: 7 days
  only:
    - main

# ============================================
# E2E / PLAYWRIGHT
# ============================================

e2e-playwright-smoke:
  stage: e2e
  image:
    name: mcr.microsoft.com/playwright:v1.61.0-noble
    entrypoint: [""]
  <<: *e2e-cache
  script:
    - cd e2e
    - npm ci --cache .npm --prefer-offline
    - npm run smoke:ci
  artifacts:
    when: always
    paths:
      - e2e/playwright-report/
      - e2e/test-results/
      - e2e/auth/manager.json
    expire_in: 7 days
  only:
    - main

