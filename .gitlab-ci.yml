stages:
  - lint
  - build
  - test
  - security

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"

# ============================================
# 📦 CACHE
# ============================================

.backend-cache: &backend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-backend"
    paths:
      - .m2/repository

.frontend-cache: &frontend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-frontend"
    paths:
      - frontend/.npm/

# ============================================
# ✅ STAGE 1 - LINT
# ============================================

lint-backend:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - echo "🔍 Linting backend..."
    - cd backend
    - mvn validate
  only:
    - main

lint-frontend:
  stage: lint
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - echo "🔍 Linting frontend..."
    - node -v
    - npm -v
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npx eslint src || true
  only:
    - main

# ============================================
# 🏗️ STAGE 2 - BUILD
# ============================================

build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - echo "🏗️ Building backend..."
    - cd backend
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 hour
  only:
    - main

build-frontend:
  stage: build
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - echo "🏗️ Building frontend..."
    - node -v
    - npm -v
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/build/
    expire_in: 1 hour
  only:
    - main

# ============================================
# 🧪 STAGE 3 - TEST
# ============================================

test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - echo "🧪 Running backend tests..."
    - cd backend
    - mvn test
  only:
    - main

test-frontend:
  stage: test
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - echo "🧪 Running frontend tests..."
    - node -v
    - npm -v
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm test -- --watchAll=false
  only:
    - main

# ============================================
# 🔐 STAGE 4 - SECURITY
# ============================================

security-backend:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - echo "🔐 Scanning backend dependencies..."
    - cd backend
    - mvn dependency-check:check || true
  only:
    - main

security-frontend:
  stage: security
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - echo "🔐 Scanning frontend dependencies..."
    - node -v
    - npm -v
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm audit --audit-level=high || true
  only:
    - main