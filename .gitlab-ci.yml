stages:
  - lint
  - build
  - test
  - e2e

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

# ============================================
# CACHE
# ============================================

.backend-cache: &backend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-backend"
    paths:
      - .m2/repository

.frontend-cache: &frontend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-frontend"
    paths:
      - frontend/.npm/

.e2e-cache: &e2e-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-e2e"
    paths:
      - e2e/.npm/

# ============================================
# LINT
# ============================================

lint-backend:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn validate
  only:
    - main

lint-frontend:
  stage: lint
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npx eslint src || true
  only:
    - main

# ============================================
# BUILD
# ============================================

build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 hour
  only:
    - main

build-frontend:
  stage: build
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/build/
    expire_in: 1 hour
  only:
    - main

# ============================================
# TEST
# ============================================

test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn test
  only:
    - main

test-frontend:
  stage: test
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm test -- --watchAll=false
  only:
    - main

# ============================================
# API TESTING / NEWMAN
# ============================================

test-api-newman:
  stage: test
  image: node:24-bullseye
  cache:
    key: "$CI_COMMIT_REF_SLUG-automation"
    paths:
      - automation/node_modules/
  variables:
    API_URL: $API_URL
    MANAGER_EMAIL: $MANAGER_EMAIL
    MANAGER_PASSWORD: $MANAGER_PASSWORD
    TECHNICIAN_EMAIL: $TECHNICIAN_EMAIL
    TECHNICIAN_PASSWORD: $TECHNICIAN_PASSWORD
    USER_EMAIL: $USER_EMAIL
    USER_PASSWORD: $USER_PASSWORD
  before_script:
    - cd automation
    - npm ci
    # Debug: Verify environment variables are set
    - echo "Checking CI/CD variables..."
    - echo "API_URL is set: $([ -z '$API_URL' ] && echo 'NO' || echo 'YES')"
    # Create environment JSON file
    - |
      python3 << 'PYSCRIPT'
      import json
      import os
      
      env_data = {
        "id": "ci-environment",
        "name": "CI Environment",
        "values": [
          {"key": "api_url", "value": os.getenv("API_URL", ""), "type": "string", "enabled": True},
          {"key": "manager_email", "value": os.getenv("MANAGER_EMAIL", ""), "type": "string", "enabled": True},
          {"key": "manager_password", "value": os.getenv("MANAGER_PASSWORD", ""), "type": "string", "enabled": True},
          {"key": "technician_email", "value": os.getenv("TECHNICIAN_EMAIL", ""), "type": "string", "enabled": True},
          {"key": "technician_password", "value": os.getenv("TECHNICIAN_PASSWORD", ""), "type": "string", "enabled": True},
          {"key": "user_email", "value": os.getenv("USER_EMAIL", ""), "type": "string", "enabled": True},
          {"key": "user_password", "value": os.getenv("USER_PASSWORD", ""), "type": "string", "enabled": True}
        ]
      }
      
      with open("/tmp/ci-env.json", "w") as f:
        json.dump(env_data, f, indent=2)
      
      print("✓ Environment file created successfully")
      print(f"✓ API_URL: {os.getenv('API_URL', 'NOT SET')}")
      PYSCRIPT
    # Verify the file was created
    - test -f /tmp/ci-env.json && echo "✓ Environment file exists" || echo "✗ Environment file missing"
  script:
    - npm run test:api -- --environment /tmp/ci-env.json
  artifacts:
    when: always
    paths:
      - automation/postman-report.html
      - automation/newman-results.json
    reports:
      junit: automation/newman-results.xml
    expire_in: 7 days
  only:
    - main

# ============================================
# E2E / PLAYWRIGHT
# ============================================

e2e-playwright-smoke:
  stage: e2e
  image:
    name: mcr.microsoft.com/playwright:v1.61.0-noble
    entrypoint: [""]
  <<: *e2e-cache
  script:
    - cd e2e
    - npm ci --cache .npm --prefer-offline
    - npm run smoke:ci
  artifacts:
    when: always
    paths:
      - e2e/playwright-report/
      - e2e/test-results/
      - e2e/auth/manager.json
    expire_in: 7 days
  only:
    - main

