stages:
  - lint
  - build
  - test
  - e2e
  - security

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

# ============================================
# CACHE
# ============================================

.backend-cache: &backend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-backend"
    paths:
      - .m2/repository

.frontend-cache: &frontend-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-frontend"
    paths:
      - frontend/.npm/

.e2e-cache: &e2e-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-e2e"
    paths:
      - e2e/.npm/

# ============================================
# LINT
# ============================================

lint-backend:
  stage: lint
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn validate
  only:
    - main

lint-frontend:
  stage: lint
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npx eslint src || true
  only:
    - main

# ============================================
# BUILD
# ============================================

build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 hour
  only:
    - main

build-frontend:
  stage: build
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/build/
    expire_in: 1 hour
  only:
    - main

# ============================================
# TEST
# ============================================

test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn test
  only:
    - main

test-frontend:
  stage: test
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm test -- --watchAll=false
  only:
    - main

# ============================================
# E2E / PLAYWRIGHT
# ============================================

e2e-playwright-smoke:
  stage: e2e
  image:
    name: mcr.microsoft.com/playwright:v1.60.0-noble
    entrypoint: [""]
  <<: *e2e-cache
  script:
    - cd e2e
    - npm ci --cache .npm --prefer-offline
    - npm run smoke:ci
  artifacts:
    when: always
    paths:
      - e2e/playwright-report/
      - e2e/test-results/
      - e2e/auth/manager.json
    expire_in: 7 days
  only:
    - main

# ============================================
# SECURITY
# ============================================

security-backend:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  <<: *backend-cache
  script:
    - cd backend
    - mvn dependency-check:check || true
  only:
    - main

security-frontend:
  stage: security
  image: node:24-bullseye
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm audit --audit-level=high || true
  only:
    - main